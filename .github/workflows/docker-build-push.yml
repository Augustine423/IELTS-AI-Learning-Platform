name: Build and Push Docker Images

on:
  push:
    branches: [main, master, feature/livekit-voice]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        default: "linux/amd64"

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'kyawzayarsoe' }}
  BACKEND_IMAGE: ${{ vars.DOCKERHUB_USERNAME || 'kyawzayarsoe' }}/ielts-ai-backend
  FRONTEND_IMAGE: ${{ vars.DOCKERHUB_USERNAME || 'kyawzayarsoe' }}/ielts-ai-frontend
  AGENT_IMAGE: ${{ vars.DOCKERHUB_USERNAME || 'kyawzayarsoe' }}/ielts-ai-livekit-agent
  PLATFORMS: ${{ github.event.inputs.platforms || 'linux/amd64' }}
  PUSH_IMAGES: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}

jobs:
  build-backend:
    name: Backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: mode=min
          sbom: true

  build-frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: mode=min
          sbom: true

  build-agent:
    name: LiveKit agent image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: ./agents/ielts_voice
          file: ./agents/ielts_voice/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=livekit-agent
          cache-to: type=gha,mode=max,scope=livekit-agent
          provenance: mode=min
          sbom: true

  summary:
    name: CI summary
    needs: [build-backend, build-frontend, build-agent]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write job summary
        env:
          BACKEND: ${{ needs.build-backend.result }}
          FRONTEND: ${{ needs.build-frontend.result }}
          AGENT: ${{ needs.build-agent.result }}
          PUSH: ${{ env.PUSH_IMAGES }}
          USER: ${{ env.DOCKERHUB_USERNAME }}
        run: |
          {
            echo "## Docker CI summary (LiveKit-only)"
            echo "| Image | Result |"
            echo "|-------|--------|"
            echo "| \`${USER}/ielts-ai-backend\` | ${BACKEND} |"
            echo "| \`${USER}/ielts-ai-frontend\` | ${FRONTEND} |"
            echo "| \`${USER}/ielts-ai-livekit-agent\` | ${AGENT} |"
            echo ""
            echo "- **Push:** \`${PUSH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if a required build failed
        if: |
          needs.build-backend.result == 'failure' ||
          needs.build-frontend.result == 'failure' ||
          needs.build-agent.result == 'failure'
        run: exit 1
