name: Build and Push Docker Images

on:
  push:
    branches: [main, master, feature/livekit-voice]
    tags: ["v*"]
  pull_request:
    branches: [main, master, feature/livekit-voice]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        default: "linux/amd64"

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: kyawzayarsoe
  WEB_IMAGE: kyawzayarsoe/ielts-ai-livekit-web
  AGENT_IMAGE: kyawzayarsoe/ielts-ai-livekit-agent
  PLATFORMS: ${{ github.event.inputs.platforms || 'linux/amd64' }}
  PUSH_IMAGES: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}

jobs:
  build-web:
    name: Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          target: production
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          provenance: mode=min
          sbom: true

  build-agent:
    name: LiveKit agent image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/livekit-voice' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: ./agent
          file: ./agent/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent
          provenance: mode=min
          sbom: true

  summary:
    name: CI summary
    needs: [build-web, build-agent]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write job summary
        env:
          WEB: ${{ needs.build-web.result }}
          AGENT: ${{ needs.build-agent.result }}
          PUSH: ${{ env.PUSH_IMAGES }}
          USER: ${{ env.DOCKERHUB_USERNAME }}
        run: |
          {
            echo "## Docker CI summary"
            echo "| Image | Result |"
            echo "|-------|--------|"
            echo "| \`${USER}/ielts-ai-livekit-web\` | ${WEB} |"
            echo "| \`${USER}/ielts-ai-livekit-agent\` | ${AGENT} |"
            echo ""
            echo "- **Push:** \`${PUSH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if a required build failed
        if: |
          needs.build-web.result == 'failure' ||
          needs.build-agent.result == 'failure'
        run: exit 1
