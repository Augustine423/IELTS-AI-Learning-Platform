llm:
  provider: ollama
  model: llama3.2
  base_url: http://localhost:11434
  temperature: 0.7
  max_tokens: 2048

stt:
  provider: whisper
  model: base
  language: en

tts:
  provider: edge
  # elevenlabs voice_id used when provider is elevenlabs
  elevenlabs_voice_id: ""

ielts:
  default_band_target: 7.0
  speaking_time_limit_seconds: 120
  writing_word_limit: 250
