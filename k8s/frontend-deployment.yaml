apiVersion: apps/v1
kind: Deployment
metadata:
  name: ielts-ai-frontend
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ielts-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ielts-ai-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ielts-ai-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: kyawzayarsoe/ielts-ai-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "80"
            - name: API_INTERNAL_URL
              value: http://ielts-ai-backend:8000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
