apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ielts-ai

# Minimum stack: frontend + backend + llama3.2
# For all skill models, also apply: kubectl apply -f k8s/ollama-full.yaml
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - ollama-deployment.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml

images:
  - name: kyawzayarsoe/ielts-ai-ollama-llama32
    newTag: latest
  - name: kyawzayarsoe/ielts-ai-backend
    newTag: latest
  - name: kyawzayarsoe/ielts-ai-frontend
    newTag: latest

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: ielts-ai
