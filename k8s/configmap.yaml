apiVersion: v1
kind: ConfigMap
metadata:
  name: ielts-ai-config
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai
data:
  config.yaml: |
    llm:
      provider: groq
      model: llama-3.3-70b-versatile
      temperature: 0.7
      max_tokens: 2048

    stt:
      provider: whisper
      model: tiny
      language: en

    tts:
      provider: edge
      elevenlabs_voice_id: ""

    ielts:
      default_band_target: 7.0
      speaking_time_limit_seconds: 120
      writing_word_limit: 250
