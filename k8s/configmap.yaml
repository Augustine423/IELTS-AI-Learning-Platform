apiVersion: v1
kind: ConfigMap
metadata:
  name: ielts-ai-config
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai
data:
  config.yaml: |
    llm:
      provider: ollama
      model: llama3.2
      base_url: http://ollama-llama32.ielts-ai.svc.cluster.local:11434
      temperature: 0.7
      max_tokens: 2048
      selection_mode: auto
      models:
        catalog:
          - llama3.2
          - qwen2.5:7b
          - llama3.1:8b
          - gemma2:9b
        by_skill:
          listening: llama3.2
          speaking: llama3.1:8b
          reading: gemma2:9b
          writing: qwen2.5:7b
        endpoints:
          llama3.2: http://ollama-llama32.ielts-ai.svc.cluster.local:11434
          llama3.1:8b: http://ollama-llama31.ielts-ai.svc.cluster.local:11434
          qwen2.5:7b: http://ollama-qwen25.ielts-ai.svc.cluster.local:11434
          gemma2:9b: http://ollama-gemma2.ielts-ai.svc.cluster.local:11434

    stt:
      provider: whisper
      model: tiny
      language: en

    tts:
      provider: edge
      elevenlabs_voice_id: ""

    ielts:
      default_band_target: 7.0
      speaking_time_limit_seconds: 120
      writing_word_limit: 250
