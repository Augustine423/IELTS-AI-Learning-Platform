apiVersion: apps/v1
kind: Deployment
metadata:
  name: ielts-ai-backend
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ielts-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ielts-ai-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ielts-ai-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: kyawzayarsoe/ielts-ai-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama-llama32.ielts-ai.svc.cluster.local:11434
          envFrom:
            - secretRef:
                name: ielts-ai-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: ielts-ai-config
