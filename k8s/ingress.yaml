apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ielts-ai-ingress
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: ielts.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ielts-ai-frontend
                port:
                  number: 80
    - host: api.ielts.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ielts-ai-backend
                port:
                  number: 8000
  # Uncomment for TLS (cert-manager or your own secret)
  # tls:
  #   - hosts:
  #       - ielts.example.com
  #       - api.ielts.example.com
  #     secretName: ielts-ai-tls
