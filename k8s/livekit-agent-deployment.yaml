apiVersion: apps/v1
kind: Deployment
metadata:
  name: ielts-ai-livekit-agent
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-livekit-agent
    app.kubernetes.io/component: livekit-agent
    app.kubernetes.io/part-of: ielts-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ielts-ai-livekit-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ielts-ai-livekit-agent
        app.kubernetes.io/component: livekit-agent
    spec:
      containers:
        - name: livekit-agent
          image: kyawzayarsoe/ielts-ai-livekit-agent:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: ielts-ai-secrets
          env:
            - name: IELTS_TTS_PROVIDER
              value: edge
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
