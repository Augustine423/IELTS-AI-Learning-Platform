# Optional — full auto skill routing (speaking / writing / reading models).
# Apply with base:  kubectl apply -k k8s/
# Or include in kustomization resources when you have enough node RAM.
#
# Resource note (approx RAM while serving):
#   llama3.1:8b ~8–10Gi | qwen2.5:7b ~8–10Gi | gemma2:9b ~10–12Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ielts-ai-ollama-llama31
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-ollama-llama31
    app.kubernetes.io/component: ollama
    app.kubernetes.io/part-of: ielts-ai
    app.kubernetes.io/model: llama31
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ielts-ai-ollama-llama31
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ielts-ai-ollama-llama31
        app.kubernetes.io/component: ollama
        app.kubernetes.io/model: llama31
    spec:
      containers:
        - name: ollama
          image: kyawzayarsoe/ielts-ai-ollama-llama31:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 11434
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 12Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-llama31
  namespace: ielts-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ielts-ai-ollama-llama31
  ports:
    - name: http
      port: 11434
      targetPort: http
---
