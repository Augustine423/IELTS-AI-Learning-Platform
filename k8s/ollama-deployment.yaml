apiVersion: apps/v1
kind: Deployment
metadata:
  name: ielts-ai-ollama-llama32
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-ollama-llama32
    app.kubernetes.io/component: ollama
    app.kubernetes.io/part-of: ielts-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ielts-ai-ollama-llama32
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ielts-ai-ollama-llama32
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: ollama
          image: kyawzayarsoe/ielts-ai-ollama-llama32:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 11434
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-llama32
  namespace: ielts-ai
spec:
  selector:
    app.kubernetes.io/name: ielts-ai-ollama-llama32
  ports:
    - port: 11434
      targetPort: 11434
---
# Optional extra models — apply when you need full auto skill routing.
# Images: ielts-ai-ollama-llama31 / qwen25 / gemma2
# Services must match docker/config.yaml endpoints hostnames.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ielts-ai-ollama-notes
  namespace: ielts-ai
data:
  README: |
    Default cluster runs llama3.2 only (ollama-llama32).
    Deploy additional model Deployments/Services named:
      ollama-llama31, ollama-qwen25, ollama-gemma2
    matching docker/config.yaml llm.models.endpoints.
