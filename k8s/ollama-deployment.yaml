# Default LLM — always deploy (listening + fallback).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ielts-ai-ollama-llama32
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-ollama-llama32
    app.kubernetes.io/component: ollama
    app.kubernetes.io/part-of: ielts-ai
    app.kubernetes.io/model: llama32
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ielts-ai-ollama-llama32
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ielts-ai-ollama-llama32
        app.kubernetes.io/component: ollama
        app.kubernetes.io/model: llama32
    spec:
      containers:
        - name: ollama
          image: kyawzayarsoe/ielts-ai-ollama-llama32:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 11434
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-llama32
  namespace: ielts-ai
  labels:
    app.kubernetes.io/name: ielts-ai-ollama-llama32
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ielts-ai-ollama-llama32
  ports:
    - name: http
      port: 11434
      targetPort: http
