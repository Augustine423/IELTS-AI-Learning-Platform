# Pull and run images published by GitHub Actions.
#
# Usage:
#   docker compose pull
#   docker compose up -d
#
# Optional tag override (default: latest):
#   IMAGE_TAG=sha-8f706f7 docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ielts-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ielts-ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct}
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"
    command:
      - |
        echo "Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "Pulling free writing model $$OLLAMA_MODEL"
        ollama pull "$$OLLAMA_MODEL"

  agent:
    image: kyawzayarsoe/ielts-ai-livekit-agent:${IMAGE_TAG:-latest}
    container_name: ielts-livekit-agent
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    restart: unless-stopped

  web:
    image: kyawzayarsoe/ielts-ai-livekit-web:${IMAGE_TAG:-latest}
    container_name: ielts-livekit-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      AGENT_NAME: ${AGENT_NAME:-ielts-voice-agent}
      ALLOW_INSECURE_TOKEN_ROUTE: "true"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct}
    depends_on:
      - agent
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
