services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: ielts-livekit-agent
    command: ["uv", "run", "src/agent.py", "start"]
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
    container_name: ielts-livekit-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      AGENT_NAME: ${AGENT_NAME:-ielts-voice-agent}
    depends_on:
      - agent
    restart: unless-stopped
