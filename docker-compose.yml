# IELTS AI — LiveKit Cloud voice stack (pull from Docker Hub)
#
#   cp .env.example .env   # fill LIVEKIT_* and GROQ_API_KEY
#   docker compose pull && docker compose up -d
#   # or: .\scripts\start.ps1
#
# Images:
#   kyawzayarsoe/ielts-ai-backend:latest
#   kyawzayarsoe/ielts-ai-frontend:latest
#   kyawzayarsoe/ielts-ai-livekit-agent:latest
#
# Self-hosting livekit-server in Compose is optional later; Cloud is the default.

x-pull: &pull-always
  pull_policy: always

x-livekit-env: &livekit-env
  LIVEKIT_URL: ${LIVEKIT_URL:-}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.groq.com/openai/v1}

services:
  backend:
    <<: *pull-always
    image: kyawzayarsoe/ielts-ai-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      <<: *livekit-env
      HOME: /app
      HF_HOME: /app/.cache/huggingface
      WHISPER_CACHE_DIR: /app/.cache/whisper
      TMPDIR: /app/tmp
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - ./docker/config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  frontend:
    <<: *pull-always
    image: kyawzayarsoe/ielts-ai-frontend:latest
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
      PORT: "80"
      HOSTNAME: 0.0.0.0
      API_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:80/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  livekit-agent:
    <<: *pull-always
    image: kyawzayarsoe/ielts-ai-livekit-agent:latest
    env_file:
      - path: .env
        required: false
    environment:
      <<: *livekit-env
      IELTS_TTS_PROVIDER: ${IELTS_TTS_PROVIDER:-edge}
      GROQ_LLM_MODEL: ${GROQ_LLM_MODEL:-llama-3.3-70b-versatile}
      GROQ_STT_MODEL: ${GROQ_STT_MODEL:-whisper-large-v3}
    restart: unless-stopped
