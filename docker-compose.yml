# Pull-only stack — uses images already built & pushed to Docker Hub by GitHub Actions.
# No local Docker builds.
#
# Quick (llama3.2 only):
#   docker compose pull && docker compose up
#
# All skill models:
#   docker compose --profile full pull && docker compose --profile full up

x-ollama-health: &ollama-health
  test: ["CMD", "curl", "-sf", "http://127.0.0.1:11434/api/tags"]
  interval: 15s
  timeout: 5s
  retries: 12
  start_period: 45s

x-pull: &pull-always
  pull_policy: always

services:
  # --- Listening default / fallback (always on) ---
  ollama-llama32:
    <<: *pull-always
    image: kyawzayarsoe/ielts-ai-ollama-llama32:latest
    ports:
      - "11434:11434"
    healthcheck: *ollama-health
    restart: unless-stopped

  # --- Speaking (profile: full) ---
  ollama-llama31:
    <<: *pull-always
    profiles: ["full"]
    image: kyawzayarsoe/ielts-ai-ollama-llama31:latest
    ports:
      - "11435:11434"
    healthcheck: *ollama-health
    restart: unless-stopped

  # --- Writing (profile: full) ---
  ollama-qwen25:
    <<: *pull-always
    profiles: ["full"]
    image: kyawzayarsoe/ielts-ai-ollama-qwen25:latest
    ports:
      - "11436:11434"
    healthcheck: *ollama-health
    restart: unless-stopped

  # --- Reading (profile: full) ---
  ollama-gemma2:
    <<: *pull-always
    profiles: ["full"]
    image: kyawzayarsoe/ielts-ai-ollama-gemma2:latest
    ports:
      - "11437:11434"
    healthcheck: *ollama-health
    restart: unless-stopped

  backend:
    <<: *pull-always
    image: kyawzayarsoe/ielts-ai-backend:latest
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama-llama32:11434
      - HOME=/app
      - HF_HOME=/app/.cache/huggingface
      - WHISPER_CACHE_DIR=/app/.cache/whisper
      - TMPDIR=/app/tmp
    volumes:
      - ./docker/config.yaml:/app/config.yaml:ro
    depends_on:
      ollama-llama32:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  frontend:
    <<: *pull-always
    image: kyawzayarsoe/ielts-ai-frontend:latest
    ports:
      # Host :80 → container :8080 (non-root; browse http://localhost)
      - "80:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - API_INTERNAL_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
